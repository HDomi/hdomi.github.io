name: Deploy to Linux Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  APP_NAME: domi-portal
  APP_DIR: /opt/docker/domi-portal
  APP_PORT: 1131

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔑 SSH 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -T 5 -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts || true

      - name: Check SSH key
        run: |
          ls -l ~/.ssh
          head -n 3 ~/.ssh/id_rsa

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "whoami; hostname"

      # 🚀 서버 배포
      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} <<EOF

          set -e

          # 배포 디렉토리 생성 및 권한 설정
          sudo mkdir -p "$APP_DIR"
          sudo chown deploy:deploy "$APP_DIR"
          cd "$APP_DIR"

          if [ ! -d ".git" ]; then
            git clone https://github.com/HDomi/hdomi.github.io.git .
          else
            git pull origin main
          fi

          # 기존 컨테이너 중지 및 삭제
          sudo docker stop "$APP_NAME" || true
          sudo docker rm "$APP_NAME" || true

          # Docker 이미지 빌드
          sudo docker build -t "$APP_NAME:latest" .

          # Docker 컨테이너 실행 (1131 포트 매핑 및 런타임 Secrets 주입)
          sudo docker run -d \
            --restart unless-stopped \
            --name "$APP_NAME" \
            -p "$APP_PORT:$APP_PORT" \
            -e FIREBASE_SERVICE_ACCOUNT_JSON='${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' \
            -e FIREBASE_DATABASE_URL='${{ secrets.FIREBASE_DATABASE_URL }}' \
            "$APP_NAME:latest"

          EOF
